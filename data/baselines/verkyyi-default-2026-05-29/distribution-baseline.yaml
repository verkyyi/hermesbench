name: verkyyi-default-baseline
version: "2026.05.29"
description: "Redacted distribution-style baseline for a local Hermes default profile."
author: "verkyyi"
license: "MIT"
benchmark:
  run_id: hb-20260529T062018Z
  score: 81.95
  observed_runtime_s: 170
  suite_count: 13
  prompt_cases: 48
  trials_per_case: 1
  suite_concurrency: 4
  case_concurrency: 8
  command: "HERMES_RUN_LLM_EVALS=1 hermesbench --high-rate --trials 1"
profile_fingerprint:
  hermesbench_git_sha: "83eae579675563fc888627c9a26df06a58ba6cec"
  profile_hash: "46baed471e56051cba87b3cb67ac1d75c7a2bb97668570c51645832f34608377"
runtime_config:
  execution_surface:
    id: kanban_delegation
    label: "Kanban delegation"
    prompt_case_contract: framework_agnostic
  model:
    provider: openai-codex
    default: gpt-5.5
  memory:
    enabled: true
    provider: honcho
    user_profile_enabled: true
  toolsets:
    - hermes-cli
    - kanban
  plugins_enabled:
    - agentfeeds
    - kanban-orchestrator-routing
    - break-glass-cli
  gateway:
    trust_recent_files: true
    trust_recent_files_seconds: 600
  kanban:
    dispatch_in_gateway: true
    orchestrator_profile: orchestrator
    default_assignee: orchestrator
    auto_decompose: true
    max_spawn: 20
worker_profile_coverage:
  kanban_enabled: true
  multi_worker_execution_exercised: false
  delegated_closure_suite: "skipped: HERMES_BENCH_DELEGATED_CLOSURE not set"
  reason: "This baseline measured the default/front-desk profile prompt suites and deterministic gateway ack policy. It did not run the async delegated worker path."
  locally_present_profiles:
    - orchestrator
    - worker
    - worker-code
    - worker-fast
    - worker-ops
    - worker-report
    - worker-research
  published_worker_profiles: []
  publication_policy: "If a baseline runs delegated/multi-worker suites, every involved orchestrator/worker profile must be published as an installable profile distribution or as a redacted distribution-style profile snapshot."
redaction:
  installable_distribution: false
  reason: "This baseline publishes benchmark-relevant runtime shape, not the full private profile distribution."
  omitted:
    - auth.json
    - .env
    - memories/
    - sessions/
    - state.db*
    - logs/
    - workspace/
    - local paths
    - personal skill allowlists
notes:
  - "Use this as a comparable benchmark baseline, not as an installable Hermes profile distribution."
  - "Future public submissions should prefer linking an installable profile distribution repository when the profile is intended to be shared."
