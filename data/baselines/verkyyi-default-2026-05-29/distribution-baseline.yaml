name: verkyyi-default-baseline
version: 2026.05.29
description: Redacted distribution-style baseline for a local Hermes default profile
  (Kanban delegation).
author: verkyyi
license: MIT
benchmark:
  run_id: hb-20260529T111322Z
  score: 77.23
  observed_runtime_s: 435
  runtime_note: Approximate wall-clock from concurrent suite durations; runner does
    not emit command wall time.
  suite_count: 13
  prompt_cases: 48
  trials_per_case: 1
  case_concurrency: 3
  suite_concurrency: 3
  high_rate: true
  evaluator_driver: codex
  agentic_max_turns_default: 2
  controller_timeout_s: 240
  driver_scenario_closed_rate: 0.9583
  turns_sent: 48
  turn_budget: 96
  command: HERMES_RUN_LLM_EVALS=1 hermesbench --high-rate --suite-concurrency 3 --case-concurrency
    3 --trials 1
  score_breakdown:
    top_axes:
      capability_truthfulness: 68.9
      reliability_safety: 94.2
      efficiency_ux: 86.5
    axes:
      task_fulfillment: 69.8
      evidence_truthfulness: 67.5
      outcome_reached: 92.3
      runtime_scope_safety: 96.2
      responsiveness: 94.6
      communication_quality: 78.4
      closure: 92.3
      artifact_correctness: 67.5
      appropriateness: 69.8
      coherence: 78.4
    coverage:
      scored_suites: 13
      registered_suites: 14
      label: 13/14
    categories:
      capability_truthfulness:
      - task_fulfillment
      - evidence_truthfulness
      reliability_safety:
      - outcome_reached
      - runtime_scope_safety
      efficiency_ux:
      - responsiveness
      - communication_quality
profile_fingerprint:
  hermesbench_git_sha: 081c15983d45e82e5caead4e19e49e1652fba2c0+dirty
  profile_hash: e460b2161d64330938300535348c5819ca9b88c5848bdfb2b5f740acb66c1355
runtime_config:
  execution_surface:
    id: kanban_delegation
    label: Kanban delegation
    kanban_enabled: true
    prompt_case_contract: framework_agnostic
  model:
    default: gpt-5.5
    provider: openai-codex
  memory:
    memory_enabled: true
    user_profile_enabled: true
    memory_char_limit: 5000
    user_char_limit: 2000
    provider: honcho
    nudge_interval: 10
    flush_min_turns: 6
  toolsets:
  - hermes-cli
  - kanban
  plugins_enabled:
  - agentfeeds
  - break-glass-cli
  - kanban-orchestrator-routing
  - observability/langfuse
  gateway:
    strict: false
    media_delivery_allow_dirs: []
    trust_recent_files: true
    trust_recent_files_seconds: 600
  kanban:
    dispatch_in_gateway: true
    dispatch_interval_seconds: 5
    synthesis_timeout_seconds: 120
    failure_limit: 2
    worker_log_rotate_bytes: 2097152
    worker_log_backup_count: 1
    orchestrator_profile: orchestrator
    default_assignee: orchestrator
    auto_decompose: true
    auto_decompose_per_tick: 3
    dispatch_stale_timeout_seconds: 14400
    max_spawn: 20
worker_profile_coverage:
  kanban_enabled: true
  multi_worker_execution_exercised: false
  delegated_closure_suite: 'skipped: HERMES_BENCH_DELEGATED_CLOSURE not set'
  published_worker_profiles: []
  publication_policy: If a baseline runs delegated/multi-worker suites, every involved
    orchestrator/worker profile must be published as an installable profile distribution
    or as a redacted distribution-style profile snapshot.
  locally_present_profiles:
  - orchestrator
  - worker
  - worker-code
  - worker-fast
  - worker-ops
  - worker-report
  - worker-research
redaction:
  installable_distribution: false
  reason: This baseline publishes benchmark-relevant runtime shape, not the full private
    profile distribution.
  omitted:
  - auth.json
  - .env
  - memories/
  - sessions/
  - state.db*
  - logs/
  - workspace/
  - local paths
  - personal skill allowlists
notes:
- Use this as a comparable benchmark baseline, not as an installable Hermes profile
  distribution.
- Bundled prompt use cases are framework-agnostic and should run with or without kanban.
- Prompt suites are agent-driven with the Codex evaluator driver; legacy static driver
  baselines are superseded.
- 'This run used the balanced 3x2 scoring model: capability/truthfulness 40%, reliability/safety
  30%, efficiency/UX 30%.'
