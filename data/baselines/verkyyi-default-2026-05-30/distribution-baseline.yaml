redaction:
  installable_distribution: false
  reason: This baseline publishes benchmark-relevant runtime shape, not the full private
    profile distribution.
  omitted:
  - auth.json
  - .env
  - memories/
  - sessions/
  - state.db*
  - logs/
  - workspace/
  - local paths
  - personal skill allowlists
notes:
- Use this as a comparable current-taxonomy benchmark baseline, not as an installable
  Hermes profile distribution.
- The 2026-05-29 legacy taxonomy baselines were removed in this refresh.
- delegated_closure was skipped because it remains opt-in for delegated/multi-profile
  execution.
- gateway_ack_policy skipped because the local Hermes Agent evals.responsiveness module
  was not importable in this run.
