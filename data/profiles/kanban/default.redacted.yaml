  synthesis_timeout_seconds: 120
  failure_limit: 2
  orchestrator_profile: orchestrator
  default_assignee: orchestrator
  auto_decompose: true
  auto_decompose_per_tick: 3
  dispatch_stale_timeout_seconds: 14400
  max_spawn: 20
mcp_servers:
- name: ainbox
  enabled: true
  auth: oauth
hashes:
  config_summary_hash: fbce17cd1b7feba2
redactions:
- auth files
- .env files
- memories
- sessions
- state databases
- logs
- local filesystem paths
- raw private SOUL sections
- MCP URLs and credentials
